
{% extends "main/base.html" %}
{% block title %}Login{% endblock %}
{% load crispy_forms_tags %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    
    <div class="card mx-auto p-4 shadow-sm" style="width: 100%; max-width: 40rem;">
        <h1 class="d-flex align-items-center justify-content-center">Login</h1>
        <form method="post">
            {% csrf_token %} 
            {{ form|crispy }}
            
            <p class="mt-3">Don't have an account? Create one <a href="/sign-up" class="text-success text-decoration-none">Here</a></p>
            
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-success">Login</button>
            </div>
        </form>
        
    </div>
</div>
{% endblock %}
