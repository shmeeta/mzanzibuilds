{% extends "main/base.html" %}
{% block title %}Sign Up{% endblock %}
{% load crispy_forms_tags %}

{% block content %} 
<div class="d-flex align-items-center justify-content-center" style="min-height: 95vh;">
    
    <div class="card mx-auto p-4 shadow-sm" style="width: 100%; max-width: 40rem;">
        <h2 class="text-center mb-4">Create Account</h2>

        <form method="post">
            {% csrf_token %} 
            {{ form|crispy }}
            
            <p class="mt-3">
                Have an account? Login <a href="/login" class="text-success text-decoration-none">Here</a>
            </p>

            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-success">Register</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
