{% extends "main/base.html" %}
{% block title %} Create a Project {% endblock %}
{% load crispy_forms_tags %}

{% block content %} 
    <div class="mt-5"> <h2>Create a New Project</h2>
        
        <form method="post" class="mt-4">
            {% csrf_token %} 
            {{ form|crispy }}

            <div class="d-flex mt-3">
                <button type="submit" class="btn btn-success ms-auto">Post Project</button>
            </div>
        </form>
    </div>
{% endblock %}
